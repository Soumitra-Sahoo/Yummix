version: "3.9"

services:
  backend:
    build: ./backend
    container_name: yummix-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: yummix-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build: ./admin
    container_name: yummix-admin
    ports:
      - "5174:5174"
    depends_on:
      - backend
    restart: unless-stopped