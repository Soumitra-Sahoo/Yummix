        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Transition not allowed from the order's current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
