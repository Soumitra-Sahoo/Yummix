openapi: 3.1.0

info:
  title: Yummix API
  version: 1.0.0
  description: >
    Multi-restaurant food delivery platform API. Covers customer ordering,
    restaurant order/menu management, rider assignment and delivery workflow,
    admin oversight, refund handling, and platform caching. Deployed as
    Vercel serverless functions.
  contact:
    name: Soumitra Sahoo
    url: https://github.com/Soumitra-Sahoo/Yummix

servers:
  - url: https://your-backend.vercel.app
    description: Production
  - url: http://localhost:4000
    description: Local development

tags:
  - name: Auth
    description: Customer account registration and login
  - name: Admin
    description: Super admin oversight (dashboard, refunds, force actions)
  - name: Restaurant
    description: Restaurant account, profile, and approval workflow
  - name: Food
    description: Menu items (create, update, list)
  - name: Cart
    description: Customer cart operations
  - name: Order
    description: Order placement, cancellation, tracking, status transitions
  - name: Rating
    description: Post-delivery food ratings
  - name: Rider
    description: Rider account, verification, availability, location
  - name: Rider Order
    description: Rider-side delivery assignment and status updates
  - name: Rider Dashboard
    description: Rider earnings and performance stats
  - name: Feedback
    description: Customer feedback and restaurant partner requests
  - name: Cron
    description: Scheduled system maintenance (internal use)
  - name: System
    description: Health check

security:
  - tokenAuth: []

components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: token
      description: >
        Raw JWT issued by /api/user/login, /api/restaurant/login,
        /api/rider/login, or /api/admin/login. Sent as-is in a header named
        "token" — NOT prefixed with "Bearer ". The token's embedded role
        claim determines which endpoints it can access.
    cronAuth:
      type: http
      scheme: bearer
      description: >
        Static secret configured as CRON_SECRET, sent as
        "Authorization: Bearer <CRON_SECRET>" by Vercel Cron or an external
        scheduler. Not a user-issued JWT.

  schemas:
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
          description: JWT to be sent back in the "token" header on subsequent requests

    GeoPoint:
      type: object
      properties:
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true

    Address:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        street:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        country:
          type: string
        phone:
          type: string

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        isAdmin:
          type: boolean
        cartData:
          type: object
        cartRestaurantId:
          type: string
          nullable: true
        hasUsedFirstCoupon:
          type: boolean

    Restaurant:
      type: object
      properties:
        _id:
          type: string
        restaurantName:
          type: string
        ownerName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        image:
          type: string
        isApproved:
          type: boolean
        rejected:
          type: boolean
        location:
          $ref: '#/components/schemas/GeoPoint'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Food:
      type: object
      properties:
        _id:
          type: string
        restaurantId:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        image:
          type: string
        category:
          type: string
          enum: [Biriyani, Rolls, Deserts, Sandwich, Cake, Pure Veg, Pasta, Noodles, Pizza, Snacks, Beverages, Breakfast, Chinese, Thali, Others]
        prepTime:
          type: number
          nullable: true
        spiceLevel:
          type: string
          enum: [Mild, Medium, Hot, Extra Hot]
        tags:
          type: array
          items:
            type: string
        isAvailable:
          type: boolean
        avgRating:
          type: number
        ratingCount:
          type: integer

    OrderItem:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer

    Order:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        restaurantId:
          type: string
        riderId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        amount:
          type: number
        address:
          $ref: '#/components/schemas/Address'
        status:
          type: string
          enum: [Order Placed, Confirmed, Preparing Food, Ready for Pickup, Waiting for Rider, Rider Assigned, Picked Up, Out for Delivery, Delivered, Cancelled, Rejected]
        date:
          type: string
          format: date-time
        payment:
          type: boolean
        paymentMethod:
          type: string
          enum: [stripe, cod]
        couponCode:
          type: string
        deliveredAt:
          type: string
          format: date-time
          nullable: true
        deliveryFee:
          type: number
        customerLocation:
          $ref: '#/components/schemas/GeoPoint'
        isQueued:
          type: boolean
        assignmentTries:
          type: integer
        cancelledBy:
          type: string
          enum: [customer, restaurant, system, admin]
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        stripeSessionId:
          type: string
          nullable: true
        stripePaymentIntentId:
          type: string
          nullable: true
        refunded:
          type: boolean
        refundId:
          type: string
          nullable: true
        refundedAt:
          type: string
          format: date-time
          nullable: true
        refundFailed:
          type: boolean
        refundRetryCount:
          type: integer
        lastRefundError:
          type: string
          nullable: true
        refundNeedsManualReview:
          type: boolean
        riderAssignmentFailed:
          type: boolean

    Rider:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        vehicleType:
          type: string
          enum: [Bike, Bicycle, Scooter]
        vehicleNumber:
          type: string
        profileImage:
          type: string
        aadhaarImage:
          type: string
        licenseImage:
          type: string
        verificationStatus:
          type: string
          enum: [pending, approved, rejected]
        isOnline:
          type: boolean
        isAvailable:
          type: boolean
        location:
          allOf:
            - $ref: '#/components/schemas/GeoPoint'
            - type: object
              properties:
                updatedAt:
                  type: string
                  format: date-time
                  nullable: true
        totalEarnings:
          type: number
        lifetimeDeliveries:
          type: integer
        currentOrderId:
          type: string
          nullable: true

    RiderEarningEntry:
      type: object
      properties:
        _id:
          type: string
        riderId:
          type: string
        orderId:
          type: string
        distanceKm:
          type: number
        baseEarning:
          type: number
        bonusEarning:
          type: number
        totalEarning:
          type: number
        deliveredAt:
          type: string
          format: date-time

    RiderAssignment:
      type: object
      properties:
        _id:
          type: string
        orderId:
          $ref: '#/components/schemas/Order'
        riderId:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected, timeout, reassigned]
        assignedAt:
          type: string
          format: date-time
        respondedAt:
          type: string
          format: date-time
          nullable: true
        timeoutAt:
          type: string
          format: date-time
          nullable: true

    Rating:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        foodId:
          type: string
        orderId:
          type: string
        stars:
          type: integer
          minimum: 1
          maximum: 5

    AdminAlert:
      type: object
      properties:
        _id:
          type: string
        type:
          type: string
          example: refund_failed
        orderId:
          $ref: '#/components/schemas/Order'
        message:
          type: string
        resolved:
          type: boolean
        createdAt:
          type: string
          format: date-time

    FeedbackSubmission:
      type: object
      properties:
        _id:
          type: string
        type:
          type: string
          enum: [feedback, partner]
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        rating:
          type: number
        restaurant:
          type: string
        city:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time

    DashboardStats:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        totalFoods:
          type: integer
        totalUsers:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        monthlyRevenue:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              revenue:
                type: number

  responses:
    Unauthorized:
      description: Missing, invalid, or wrong-role token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Request failed validation or business rule
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: API is running
          content:
            text/plain:
              schema:
                type: string
                example: Yummix API Working

  /api/user/register:
    post:
      tags: [Auth]
      summary: Register a new customer account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/user/login:
    post:
      tags: [Auth]
      summary: Customer login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/user/profile:
    get:
      tags: [Auth]
      summary: Get the logged-in customer's profile
      security:
        - tokenAuth: []
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/login:
    post:
      tags: [Admin]
      summary: Super admin login
      description: Uses the same user account as customers, gated by isAdmin=true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/dashboard:
    get:
      tags: [Admin]
      summary: Platform-wide dashboard statistics
      security:
        - tokenAuth: []
      responses:
        '200':
          description: Aggregated stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DashboardStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/restaurant-dashboard:
    get:
      tags: [Admin]
      summary: Single restaurant's dashboard statistics
      description: Gated by restaurant token, not admin token, despite the /admin prefix
      security:
        - tokenAuth: []
      responses:
        '200':
          description: Restaurant-scoped stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalRevenue:
                        type: number
                      totalOrders:
                        type: integer
                      totalFoods:
                        type: integer
                      deliveredOrders:
                        type: integer
                      pendingOrders:
                        type: integer
                      recentOrders:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
                      monthlyRevenue:
                        type: array
                        items:
                          type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/retry-assignment:
    post:
      tags: [Admin]
      summary: Force-retry rider assignment for a stuck order
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: string
      responses:
        '200':
          description: Retry triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/cancel-order:
    post:
      tags: [Admin]
      summary: Force-cancel an order and issue a refund if applicable
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: string
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/refund-alerts:
    get:
      tags: [Admin]
      summary: List unresolved refund failure alerts
      security:
        - tokenAuth: []
      responses:
        '200':
          description: List of alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminAlert'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/refund-alerts/resolve:
    post:
      tags: [Admin]
      summary: Mark a refund alert as resolved
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alertId]
              properties:
                alertId:
                  type: string
      responses:
        '200':
          description: Alert resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/register:
    post:
      tags: [Restaurant]
      summary: Register a new restaurant account
      description: Creates the account in a pending state, awaiting admin approval
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [restaurantName, ownerName, email, password, phone, address, image]
              properties:
                restaurantName:
                  type: string
                ownerName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                phone:
                  type: string
                address:
                  type: string
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Registration submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/restaurant/login:
    post:
      tags: [Restaurant]
      summary: Restaurant login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurantName, phone, password]
              properties:
                restaurantName:
                  type: string
                phone:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/pending:
    get:
      tags: [Restaurant]
      summary: List restaurants awaiting approval
      security:
        - tokenAuth: []
      responses:
        '200':
          description: Pending restaurants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Restaurant'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/approve:
    post:
      tags: [Restaurant]
      summary: Approve a pending restaurant
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurantId]
              properties:
                restaurantId:
                  type: string
      responses:
        '200':
          description: Restaurant approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/reject:
    post:
      tags: [Restaurant]
      summary: Reject a pending restaurant
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurantId]
              properties:
                restaurantId:
                  type: string
      responses:
        '200':
          description: Restaurant rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/list:
    get:
      tags: [Restaurant]
      summary: List approved restaurants
      description: Cached in Redis for 300s, invalidated on restaurant create/approve/reject/profile update
      security: []
      responses:
        '200':
          description: Approved restaurants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Restaurant'

  /api/restaurant/all:
    get:
      tags: [Restaurant]
      summary: List all restaurants regardless of status
      security:
        - tokenAuth: []
      responses:
        '200':
          description: All restaurants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Restaurant'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/profile:
    get:
      tags: [Restaurant]
      summary: Get the logged-in restaurant's profile
      security:
        - tokenAuth: []
      responses:
        '200':
          description: Restaurant profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Restaurant'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/profile/update:
    post:
      tags: [Restaurant]
      summary: Update restaurant profile details
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                restaurantName:
                  type: string
                ownerName:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/restaurant/location/update:
    post:
      tags: [Restaurant]
      summary: Set the restaurant's exact geographic location
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat:
                  type: number
                lng:
                  type: number
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/food/list:
    get:
      tags: [Food]
      summary: List all available food items across all restaurants
      security: []
      responses:
        '200':
          description: All available food items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Food'

  /api/food/add:
    post:
      tags: [Food]
      summary: Add a new food item to the restaurant's menu
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, description, price, category, image]
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                category:
                  type: string
                prepTime:
                  type: number
                spiceLevel:
                  type: string
                tags:
                  type: string
                  description: JSON-stringified array
                isAvailable:
                  type: boolean
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Food added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Food'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/food/remove:
    post:
      tags: [Food]
      summary: Remove a food item
      security:
        - tokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        '200':
          description: Food removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/food/restaurant-foods:
    get:
      tags: [Food]
      summary: List all of the logged-in restaurant's own food items
      description: Includes unavailable items, unlike the public menu endpoint
      security:
        - tokenAuth: []
      responses:
        '200':
